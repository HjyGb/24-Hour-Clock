name: Build Android APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-venv \
            openjdk-17-jdk \
            autoconf \
            automake \
            build-essential \
            libtool \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake \
            libncurses5-dev
            
      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.33
          pip install kivy==2.3.0
          pip install jinja2
          pip install packaging
          pip install toml
          pip install requests
          pip install urllib3
          # 安装稳定版本的 python-for-android
          pip install python-for-android==2021.9.5
          
      - name: Pre-accept Android SDK licenses
        run: |
          # 预创建许可证目录，避免构建时询问
          mkdir -p $HOME/.android/licenses 2>/dev/null || true
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.android/licenses/android-sdk-preview-license 2>/dev/null || true
          echo "d975f751698a77b662f10916024061290c831869" >> $HOME/.android/licenses/android-sdk-preview-license 2>/dev/null || true
          
      - name: Build APK
        run: |
          # 清理之前的构建缓存，避免使用旧的配置
          rm -rf .buildozer
          
          # 如果 buildozer.spec 不存在才初始化
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # 修改配置文件（使用更精确的匹配）
          sed -i 's/^title = .*/title = 24 小时制时钟/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = clock24/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.example/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^android.arch = .*/android.archs = arm64-v8a,armeabi-v7a/' buildozer.spec
          
          # 设置 Android SDK 环境变量
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          
          echo "Starting buildozer build process..."
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "PATH before buildozer: $PATH"
          
          # 第一次运行会下载所有需要的组件，包括 build-tools
          # 使用 env 确保环境变量传递给所有子进程
          env \
            ANDROID_HOME=$ANDROID_HOME \
            ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools \
            buildozer android debug 2>&1 | tee build.log
          
          # 构建完成后检查 build-tools 位置
          echo "Build completed. Checking build-tools location:"
          find $ANDROID_HOME -name "aidl" -type f 2>/dev/null || echo "aidl not found in ANDROID_HOME"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "build-tools directory not found"
          
          # 显示生成的 APK 文件
          echo "Looking for generated APK files:"
          find . -name "*.apk" -type f
          ls -la bin/ 2>/dev/null || echo "bin directory not found"
          
          # 验证 APK 文件是否存在
          APK_FILE=$(find . -name "*-debug.apk" -type f | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found after build"
            exit 1
          fi
          echo "APK file found: $APK_FILE"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clock24-apk
          path: ${{ github.workspace }}/bin/*-debug.apk
          if-no-files-found: error
          retention-days: 30
