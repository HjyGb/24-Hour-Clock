name: Build Android APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-venv \
            openjdk-17-jdk \
            autoconf \
            automake \
            build-essential \
            libtool \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake \
            libncurses5-dev
            
      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer==1.5.0
          pip install cython==0.29.33
          pip install kivy==2.3.0
          pip install jinja2
          pip install packaging
          pip install toml
          
      - name: Setup Android SDK
        run: |
          # 设置环境变量
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
          
          # 接受许可证（添加更多许可证）
          mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/intel-android-extra-license
          
          # 等待 sdkmanager 可用
          sleep 5
          
          # 安装必需组件
          if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;31.0.0"
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-31"
          elif [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
            yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
            yes | $ANDROID_HOME/tools/bin/sdkmanager "platform-tools"
            yes | $ANDROID_HOME/tools/bin/sdkmanager "build-tools;31.0.0"
            yes | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-31"
          else
            echo "sdkmanager not found, buildozer will handle it"
          fi
          
      - name: Build APK
        run: |
          # 如果 buildozer.spec 不存在才初始化
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # 修改配置文件（使用更精确的匹配）
          sed -i 's/^title = .*/title = 24 小时制时钟/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = clock24/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.example/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^android.arch = .*/android.archs = arm64-v8a,armeabi-v7a/' buildozer.spec
          
          # 设置环境变量
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK=$ANDROID_HOME
          export ANDROID_NDK=$HOME/.buildozer/android/platform/android-ndk-r25b
          export NDK=$ANDROID_NDK
          export NDKHOME=$ANDROID_NDK
          
          # 验证关键组件是否存在
          echo "=== 检查构建环境 ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK: $ANDROID_NDK"
          ls -la $ANDROID_HOME/build-tools/ || echo "build-tools not found yet"
          ls -la $ANDROID_NDK || echo "NDK not found yet"
          
          # 构建 debug 版本（使用 verbose 模式）
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clock24-apk
          path: bin/*.apk
