name: Build Android APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-venv \
            openjdk-17-jdk \
            autoconf \
            automake \
            build-essential \
            libtool \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake \
            libncurses5-dev \
            unzip \
            wget  # 新增：用于手动下载SDK
            
      - name: Install buildozer & dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.36  # 修正：0.29.33→0.29.36（兼容 Buildozer）
          pip install kivy==2.3.0
          pip install jinja2 packaging toml requests urllib3
          pip install python-for-android==2023.9.16  # 使用可用版本
          
      - name: Manually install Android SDK/Build-Tools
        run: |
          # 创建 buildozer 期望的目录结构
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest
                
          # 下载SDK Manager
          wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip -q
          unzip -q cmdline-tools.zip -d $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          mv $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools/* $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          rm cmdline-tools.zip
                
          # 接受所有 SDK 许可
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
                
          # 安装指定版本 Build-Tools、Android 平台和 platform-tools
          $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"
                
          # 配置环境变量
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.2:$HOME/.buildozer/android/platform/android-sdk/platform-tools:$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV
          
      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android/licenses 2>/dev/null || true
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.android/licenses/android-sdk-preview-license 2>/dev/null || true
          echo "d975f751698a77b662f10916024061290c831869" >> $HOME/.android/licenses/android-sdk-preview-license 2>/dev/null || true
          
      - name: Verify build-tools installation
        run: |
          echo "=== Checking SDK structure ==="
          ls -la $HOME/.buildozer/android/platform/android-sdk/
          echo "=== Checking build-tools ==="
          ls -la $HOME/.buildozer/android/platform/android-sdk/build-tools/
          ls -la $HOME/.buildozer/android/platform/android-sdk/build-tools/33.0.2/
          echo "=== Checking sdkmanager ==="
          ls -la $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/
          which aidl || echo "aidl not in PATH yet"
          
      - name: Build APK
        run: |
          # 清理旧缓存
          rm -rf .buildozer
          
          # 确保 spec 文件存在
          if [ ! -f buildozer.spec ]; then
            echo "Error: buildozer.spec not found!"
            exit 1
          fi
          
          # 执行构建
          echo "Starting buildozer build..."
          buildozer android debug 2>&1 | tee build.log
          
          # 强制检查 APK 是否生成（无 APK 则直接报错）
          APK_FILE=$(find . -name "*-debug.apk" -type f | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "Error: No APK generated! Build log:"
            cat build.log
            exit 1
          fi
          echo "APK generated successfully: $APK_FILE"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clock24-apk
          path: ${{ github.workspace }}/bin/*-debug.apk  # 精确匹配APK路径
          if-no-files-found: error  # 修正：warn→error，无APK时直接报错
          retention-days: 30
