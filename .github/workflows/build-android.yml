name: Build Android APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-venv \
            openjdk-17-jdk \
            autoconf \
            automake \
            build-essential \
            libtool \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake \
            libncurses5-dev
            
      - name: Install buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.33
          pip install kivy==2.3.0
          pip install jinja2
          pip install packaging
          pip install toml
          pip install requests
          pip install urllib3
          
      - name: Pre-accept Android SDK licenses
        run: |
          # 预创建许可证目录，避免构建时询问
          mkdir -p $HOME/.android/licenses 2>/dev/null || true
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/licenses/android-sdk-license 2>/dev/null || true
          
      - name: Build APK
        run: |
          # 清理之前的构建缓存，避免使用旧的配置
          rm -rf .buildozer
          
          # 如果 buildozer.spec 不存在才初始化
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # 修改配置文件（使用更精确的匹配）
          sed -i 's/^title = .*/title = 24 小时制时钟/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = clock24/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.example/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^android.arch = .*/android.archs = arm64-v8a,armeabi-v7a/' buildozer.spec
          
          # 设置环境变量，确保 aidl 可以被找到
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/30.0.3
          
          # 构建 debug 版本 - Buildozer 会自动下载所有需要的东西
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clock24-apk
          path: bin/*.apk
