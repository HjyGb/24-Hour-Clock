name: Build Android APK
on:
  push:
    branches: [ main ]  # 触发分支可自定义
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            openjdk-17-jdk \
            unzip \
            libncurses5 \
            libstdc++6 \
            zlib1g \
            wget

      - name: 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Buildozer
        run: |
          pip3 install --upgrade buildozer cython==0.29.36

      - name: 配置 Android SDK 环境变量
        run: |
          echo "ANDROIDSDK=/home/runner/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=/home/runner/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROIDAPI=33" >> $GITHUB_ENV  # 对应 build-tools 版本
          echo "BUILD_TOOLS=33.0.2" >> $GITHUB_ENV  # 必须指定具体版本

      - name: 安装 Android SDK 和 Build-Tools
        run: |
          # 创建 SDK 目录
          mkdir -p $ANDROIDSDK
          cd $ANDROIDSDK

          # 下载 SDK Manager (cmdline-tools)
          wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/latest/
          mv cmdline-tools/lib cmdline-tools/latest/
          rm -rf cmdline-tools.zip

          # 接受 SDK 许可（关键）
          yes | $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

          # 安装 Build-Tools 和 Platform Tools
          $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager "build-tools;$BUILD_TOOLS" "platforms;android-$ANDROIDAPI" "ndk;25.2.9519653" "platform-tools"

      - name: 配置 Buildozer.spec（关键修复）
        run: |
          # 编辑 buildozer.spec，注入 Android SDK 路径
          sed -i "s|# android.sdk_path = |android.sdk_path = $ANDROIDSDK|g" buildozer.spec
          # 确保 AIDL 路径被识别
          echo "export PATH=\$PATH:$ANDROIDSDK/build-tools/$BUILD_TOOLS" >> ~/.bashrc
          source ~/.bashrc

      - name: 构建 APK
        run: |
          # 清理旧构建缓存（避免冲突）
          rm -rf .buildozer
          # 执行构建
          buildozer android debug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk