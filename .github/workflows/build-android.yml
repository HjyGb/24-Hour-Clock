name: Build 24HourClock Android APK

# ========== 触发条件（无风险） ==========
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# ========== 权限配置（足够且不超限） ==========
permissions:
  contents: write
  actions: read  # 新增：避免权限不足报错

jobs:
  build-apk:
    runs-on: ubuntu-22.04  # 固定Ubuntu版本（而非latest），避免系统版本变更导致依赖错
    timeout-minutes: 60  # 延长超时时间，避免首次下载SDK/NDK超时
    steps:
      # ========== 步骤1：检出代码（防路径错） ==========
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: .  # 强制检出到工作目录根目录，避免嵌套路径

      # ========== 步骤2：安装系统依赖（版本固定，防错） ==========
      - name: Install system dependencies
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            python3.9 python3.9-pip python3.9-dev \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential  # 新增编译依赖，避免源码编译报错
          # 强制指定python3.9为默认，避免系统python版本冲突
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 1
          sudo update-alternatives --set python3 /usr/bin/python3.9

      # ========== 步骤3：设置Python（版本锁定，防错） ==========
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.19'  # 精确到小版本，避免自动升级
          cache: 'pip'
          cache-dependency-path: |  # 指定缓存依赖文件，加速构建
            requirements.txt

      # ========== 步骤4：安装Buildozer（版本锁定，防错） ==========
      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip3 install buildozer==1.5.0  # 锁定Buildozer版本，避免新版bug
          # 验证Buildozer安装，提前发现问题
          buildozer --version

      # ========== 步骤5：缓存SDK/NDK（防重复下载，加速+防错） ==========
      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-ndk-r25b
            ~/.buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-ndk-sdk-25b-33
          restore-keys: |
            ${{ runner.os }}-android-ndk-sdk-

      # ========== 步骤6：预生成Buildozer配置（防配置文件缺失） ==========
      - name: Ensure buildozer.spec exists
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            # 覆盖默认配置（确保核心参数正确）
            sed -i 's/title = My Application/title = 24HourClock/' buildozer.spec
            sed -i 's/package.name = myapp/package.name = clock24/' buildozer.spec
            sed -i 's/requirements = python3,kivy/requirements = python3==3.9.19,kivy==2.2.1/' buildozer.spec
          fi

      # ========== 步骤7：打包APK（防内存/编译错） ==========
      - name: Build Android APK
        run: |
          # 限制编译线程数，避免GitHub Actions虚拟机内存不足
          export BUILDOZER_ANDROID_JOBS=1
          # 执行打包，输出详细日志
          buildozer android debug 2>&1 | tee buildozer.log
        env:
          # 强制指定编码，避免中文日志乱码/报错
          LC_ALL: C.UTF-8
          LANG: C.UTF-8

      # ========== 步骤8：上传日志（打包失败时排查问题） ==========
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: buildozer.log
        if: always()  # 无论打包成功/失败都上传

      # ========== 步骤9：上传APK产物（防路径错） ==========
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 24HourClock-APK
          path: |
            ./bin/*.apk  # 匹配所有APK文件，避免文件名拼写错
          if-no-files-found: error  # 无APK文件则直接报错，提前发现问题

      # ========== 步骤10：发布到Release（防权限/路径错） ==========
      - name: Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}