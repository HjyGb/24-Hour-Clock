name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          openjdk-17-jdk \
          autoconf \
          automake \
          build-essential \
          libtool \
          libffi-dev \
          libssl-dev \
          zlib1g-dev
    
    - name: Install buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer
    
    - name: Build Android APK
      run: |
        buildozer init
        sed -i 's/title = .*/title = 24 小时制时钟/' buildozer.spec
        sed -i 's/package.name = .*/package.name = clock24/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.example/' buildozer.spec
        sed -i 's/orientation = .*/orientation = portrait/' buildozer.spec
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: clock24-debug-apk
        path: bin/*.apk
        retention-days: 30
